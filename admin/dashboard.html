<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard — Admin</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="admin-page">

    <!-- Top Bar -->
    <header class="admin-header">
        <div class="admin-header-inner">
            <div class="admin-brand">
                <span class="admin-brand-icon">🔐</span>
                <span class="admin-brand-text">Portfolio Admin</span>
            </div>
            <div class="admin-header-actions">
                <span id="user-info" class="user-info"></span>
                <a href="../" target="_blank" class="btn btn-ghost btn-sm">View Site ↗</a>
                <button id="logout-btn" class="btn btn-outline btn-sm">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="admin-tabs">
        <div class="admin-tabs-inner">
            <button class="tab-btn active" data-tab="profile">Profile & Hero</button>
            <button class="tab-btn" data-tab="projects">Projects</button>
            <button class="tab-btn" data-tab="tools">Tools</button>
            <button class="tab-btn" data-tab="experience">Experience</button>
        </div>
    </nav>

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar hidden"></div>

    <!-- Main Content Area -->
    <main class="admin-main">

        <!-- PROFILE TAB -->
        <section id="tab-profile" class="tab-panel active">
            <div class="panel-header">
                <h2>Profile & Hero Section</h2>
                <button id="save-profile" class="btn btn-primary">💾 Save Changes</button>
            </div>
            <div id="profile-editor" class="editor-content">
                <p class="loading-msg">Loading…</p>
            </div>
        </section>

        <!-- PROJECTS TAB -->
        <section id="tab-projects" class="tab-panel">
            <div class="panel-header">
                <h2>Projects</h2>
                <div class="panel-actions">
                    <button id="add-project" class="btn btn-outline">+ Add Project</button>
                    <button id="save-projects" class="btn btn-primary">💾 Save All</button>
                </div>
            </div>
            <div id="projects-editor" class="editor-content">
                <p class="loading-msg">Loading…</p>
            </div>
        </section>

        <!-- TOOLS TAB -->
        <section id="tab-tools" class="tab-panel">
            <div class="panel-header">
                <h2>Tools & Products</h2>
                <div class="panel-actions">
                    <button id="add-tool" class="btn btn-outline">+ Add Tool</button>
                    <button id="save-tools" class="btn btn-primary">💾 Save All</button>
                </div>
            </div>
            <div id="tools-editor" class="editor-content">
                <p class="loading-msg">Loading…</p>
            </div>
        </section>

        <!-- EXPERIENCE TAB -->
        <section id="tab-experience" class="tab-panel">
            <div class="panel-header">
                <h2>Professional Experience</h2>
                <div class="panel-actions">
                    <button id="add-experience" class="btn btn-outline">+ Add Role</button>
                    <button id="save-experience" class="btn btn-primary">💾 Save All</button>
                </div>
            </div>
            <div id="experience-editor" class="editor-content">
                <p class="loading-msg">Loading…</p>
            </div>
        </section>

    </main>

    <!-- Scripts -->
    <script src="js/github-api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/editor-profile.js"></script>
    <script src="js/editor-projects.js"></script>
    <script src="js/editor-tools.js"></script>
    <script src="js/editor-experience.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
